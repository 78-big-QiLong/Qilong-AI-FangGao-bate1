<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrollCleanPro Panel</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 15px;
            background-color: #0a0c10;
            color: #00ff66;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Mono", "Courier New", monospace;
            overflow-x: hidden;
        }
        
        /* 🚀 2秒超高速流光跑馬燈線條 */
        .marquee-border {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ff0055, #00ff66, #00e5ff, #ff0055);
            background-size: 300% 100%;
            animation: flow 2s linear infinite;
            border-radius: 2px;
            margin-bottom: 15px;
        }
        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ff66;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #8899a6;
        }

        /* 硬體探針看板 */
        .panel-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #1f3d24;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .panel-title {
            font-size: 12px;
            color: #00e5ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
        }
        .info-item span {
            color: #8899a6;
        }

        /* App 名單勾選區 */
        .app-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        .app-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        .app-item input {
            margin-right: 8px;
            accent-color: #00ff66;
        }

        /* 控制大底座按鈕 */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-clean {
            background-color: #ff0055;
            color: #ffffff;
            text-shadow: 0 0 5px #000;
            box-shadow: 0 4px 12px rgba(255, 0, 85, 0.3);
        }
        .btn-clean:active { background-color: #cc0044; transform: scale(0.98); }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-start {
            background-color: #00ff66;
            color: #0a0c10;
            box-shadow: 0 4px 12px rgba(0, 255, 102, 0.2);
        }
        .btn-start:active { background-color: #00cc52; transform: scale(0.98); }
        
        .btn-stop {
            background-color: #ffaa00;
            color: #0a0c10;
            box-shadow: 0 4px 12px rgba(255, 170, 0, 0.2);
        }
        .btn-stop:active { background-color: #cc8800; transform: scale(0.98); }

        /* 終端日誌面板 */
        .console-box {
            background: #000000;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 10px;
            height: 180px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.4;
            color: #add8e6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .log-line {
            margin-bottom: 4px;
            word-break: break-all;
        }
        .log-time { color: #555; margin-right: 5px; }
        .log-tag-ui { color: #ff0055; }
        .log-tag-root { color: #00ff66; }
    </style>
</head>
<body>

    <div class="marquee-border"></div>

    <div class="header">
        <h1>TROLLCLEANPRO</h1>
        <p>巨魔特權級 var 緩存重置內核 v1.0.5</p>
    </div>

    <div class="panel-box">
        <div class="panel-title">📡 核心設備狀態探針</div>
        <div class="info-grid">
            <div class="info-item"><span>機型:</span> <b id="dev-model">iPhone Arm64</b></div>
            <div class="info-item"><span>系統:</span> <b id="dev-os">iOS 15.0+</b></div>
            <div class="info-item"><span>特權環境:</span> <span style="color:#00ff66;">TrollStore (Root)</span></div>
            <div class="info-item"><span>沙盒攔截:</span> <span style="color:#00e5ff;">已繞過 (0沙盒)</span></div>
        </div>
    </div>

    <div class="panel-box">
        <div class="panel-title">🎯 選擇定點爆破目標 (Keychain/var 減法)</div>
        <div class="app-list">
            <label class="app-item"><input type="checkbox" value="com.tencent.xin" checked> 微信 (WeChat)</label>
            <label class="app-item"><input type="checkbox" value="com.ss.iphone.ugc.Aweme" checked> 抖音 (TikTok)</label>
            <label class="app-item"><input type="checkbox" value="com.xingin.xhs"> 小紅書 (XHS)</label>
            <label class="app-item"><input type="checkbox" value="com.alipay.iphoneclient"> 支付寶</label>
        </div>
    </div>

    <button class="btn btn-clean" onclick="triggerClean()">🚀 執行重度深清 (清除後重啟用戶空間)</button>
    
    <div class="btn-group">
        <button class="btn btn-start" onclick="triggerStartIDFA()">▶️ 啟動無限快刷</button>
        <button class="btn btn-stop" onclick="triggerStopIDFA()">⏸️ 暫停快刷</button>
    </div>

    <div class="panel-title" style="margin-top: 15px; margin-left: 2px;">📟 提權總線實時日誌</div>
    <div class="console-box" id="console">
        <div class="log-line"><span class="log-time">[00:00:00]</span><span class="log-tag-ui">[MAIN_UI]</span> 終端管道監聽已就緒，等待指令...</div>
    </div>

    <script>
        // 通用日誌印表機
        function appendLog(tag, message) {
            const consoleBox = document.getElementById('console');
            const now = new Date();
            const timeStr = `[${now.toTimeString().split(' ')[0]}]`;
            
            const line = document.createElement('div');
            line.className = 'log-line';
            
            const tagClass = tag === '[MAIN_UI]' ? 'log-tag-ui' : 'log-tag-root';
            
            line.innerHTML = `<span class="log-time">${timeStr}</span><span class="${tagClass}">${tag}</span> ${message}`;
            consoleBox.appendChild(line);
            
            // 自動滾動到底部
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // 供後端 Objective-C 通過 evaluateJavaScript 反向注入日誌的全局接口
        function updateTerminalLog(nativeLogMessage) {
            if (nativeLogMessage.includes('[ROOT_HELPER]')) {
                const msg = nativeLogMessage.replace('[ROOT_HELPER]', '');
                appendLog('[ROOT_SYS]', msg);
            } else {
                appendLog('[ROOT_SYS]', nativeLogMessage);
            }
        }

        // 🚀 觸發重度深清
        function triggerClean() {
            const checkboxes = document.querySelectorAll('.app-list input[type="checkbox"]');
            const selectedApps = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selectedApps.push(cb.value);
            });

            appendLog('[MAIN_UI]', `下發標準深清指令，目標App數: ${selectedApps.length} 個...`);
            
            // 向 main.m 發射信號
            window.webkit.messageHandlers.trollAction.postMessage({
                "action": "executeClean",
                "apps": selectedApps
            });
        }

        // ▶️ 啟動無限快刷
        function triggerStartIDFA() {
            appendLog('[MAIN_UI]', "點火啟動後台 IDFA 輪詢守護進程...");
            window.webkit.messageHandlers.trollAction.postMessage({
                "action": "startIDFA"
            });
        }

        // ⏸️ 暫停快刷
        function triggerStopIDFA() {
            appendLog('[MAIN_UI]', "向提權總線發射 SIGKILL 強殺信號...");
            window.webkit.messageHandlers.trollAction.postMessage({
                "action": "stopIDFA"
            });
        }

        // 自動動態校準前端螢幕設備數據
        try {
            document.getElementById('dev-os').innerText = `iOS ` + navigator.userAgent.match(/OS (\d+_\d+)/)[1].replace('_', '.');
        } catch(e) {}
    </script>
</body>
</html>
