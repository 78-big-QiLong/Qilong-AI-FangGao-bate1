name: Build QiLong-Dynamic-Whitelist IPA

on:
  push:
    branches: [ main, master ] # 當你推送到 main 或 master 分支時自動觸發
  workflow_dispatch: # 支援在網頁上點擊按鈕手動觸發打包

jobs:
  build:
    runs-on: macos-latest # 啟動蘋果官方最新的 Mac 雲端伺服器

    steps:
      - name: 1. 拉取本地代碼庫
        uses: actions/checkout@v4

      - name: 2. 呼叫 Clang 執行全項目編譯
        run: |
          make

      - name: 3. 組裝 iOS .app 標準規範目錄
        run: |
          mkdir -p QiLong-Dynamic-Whitelist.app
          cp QiLong-Dynamic-Whitelist QiLong-Dynamic-Whitelist.app/
          cp RootHelper QiLong-Dynamic-Whitelist.app/
          cp src/index.html QiLong-Dynamic-Whitelist.app/
          cp Info.plist QiLong-Dynamic-Whitelist.app/
          
          # 如果有配置圖標，則物理拷貝圖標
          if [ -f src/AppIcon.png ]; then cp src/AppIcon.png QiLong-Dynamic-Whitelist.app/; fi

      - name: 4. 注入巨魔免沙盒特權（Ad-Hoc 偽簽名）
        run: |
          codesign -f -s - --entitlements src/entitlements.plist QiLong-Dynamic-Whitelist.app/QiLong-Dynamic-Whitelist
          codesign -f -s - --entitlements src/entitlements.plist QiLong-Dynamic-Whitelist.app/RootHelper

      - name: 5. 封裝成標準 .ipa 安裝包
        run: |
          mkdir Payload
          mv QiLong-Dynamic-Whitelist.app Payload/
          zip -r QiLong-Dynamic-Whitelist.ipa Payload

      - name: 6. 將編譯好的 IPA 吐出到網頁提供下載
        uses: actions/upload-artifact@v4
        with:
          name: QiLong-Dynamic-Whitelist-Release
          path: QiLong-Dynamic-Whitelist.ipa