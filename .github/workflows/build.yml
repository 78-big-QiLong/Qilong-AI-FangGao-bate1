name: Build TrollCleanPro IPA

on:
  push:
    branches: [ main, master ] # 當你推送到 main 或 master 分支時自動觸發
  workflow_dispatch: # 支援在網頁上點擊按鈕手動觸發打包

jobs:
  build:
    runs-on: macos-latest # 啟動蘋果官方最新的 Mac 雲端伺服器

    steps:
      - name: 1. 拉取本地代碼庫
        uses: actions/checkout@v4

      - name: 2. 呼叫 Clang 執行全項目編譯
        run: |
          make

      - name: 3. 組裝 iOS .app 標準規範目錄
        run: |
          mkdir -p TrollCleanPro.app
          cp TrollCleanPro TrollCleanPro.app/
          cp RootHelper TrollCleanPro.app/
          cp src/index.html TrollCleanPro.app/
          cp Info.plist TrollCleanPro.app/
          test -f src/AppIcon.png && cp src/AppIcon.png TrollCleanPro.app/ || echo "No icon found, skipping"

      - name: 4. 注入巨魔免沙盒特權（Ad-Hoc 偽簽名）
        run: |
          # 使用 Mac 內建的 codesign 配合我們寫好的 entitlements.plist 焊死特權
          codesign -f -s - --entitlements src/entitlements.plist TrollCleanPro.app/TrollCleanPro
          codesign -f -s - --entitlements src/entitlements.plist TrollCleanPro.app/RootHelper

      - name: 5. 封裝封裝成標準 .ipa 安裝包
        run: |
          mkdir Payload
          mv TrollCleanPro.app Payload/
          zip -r TrollCleanPro.ipa Payload

      - name: 6. 將編譯好的 IPA 吐出到網頁提供下載
        uses: actions/upload-artifact@v4
        with:
          name: TrollCleanPro-Release-Package
          path: TrollCleanPro.ipa